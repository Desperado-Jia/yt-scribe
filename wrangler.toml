name = "yt-scribe-worker"
main = "dist/worker.js"
compatibility_date = "2026-06-15"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV_STORE"
id = "REPLACE_WITH_KV_ID"

[vars]
DEMO_VIDEO_ID = "xRh2sVcNXQ8"
MAX_CHARS = "150000"

[env.dev]
name = "yt-scribe-worker-dev"
[env.dev.vars]
SKIP_YOUTUBE_FETCH = "true"
